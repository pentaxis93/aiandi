# workmux configuration for aiandi
# Astro-based AI & I blog

# Use canonical workmux structure: aiandi__worktrees/ as sibling

panes:
  - command: <agent>
    focus: true

files:
  # Symlink: share caches across worktrees (saves disk, speeds builds)
  symlink:
    - node_modules    # Dependencies (bun install creates these)
    - .astro          # Astro build cache
    - dist            # Build output (if you want to share)

  # Copy: per-worktree config that may differ
  copy:
    - .env            # Environment variables (may not exist yet)
    - .env.production # Production env (may not exist yet)
